name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # GITHUB_TOKEN pushes (e.g. fetch-data) do not trigger push workflows
  workflow_run:
    workflows: [Fetch Market Data]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  actions: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve code build number
        id: build-number
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "$GITHUB_EVENT_NAME" != "workflow_run" ]]; then
            echo "value=$GITHUB_RUN_NUMBER" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # A market-data refresh redeploys the existing app. Reuse the most
          # recent code deployment's build number instead of counting it as a
          # new app build.
          latest_push="$(
            gh api --method GET \
              "repos/$GITHUB_REPOSITORY/actions/workflows/deploy.yml/runs" \
              -f branch=main \
              -f event=push \
              -f status=success \
              -F per_page=1 \
              --jq '.workflow_runs[0].run_number // 0'
          )"
          latest_dispatch="$(
            gh api --method GET \
              "repos/$GITHUB_REPOSITORY/actions/workflows/deploy.yml/runs" \
              -f branch=main \
              -f event=workflow_dispatch \
              -f status=success \
              -F per_page=1 \
              --jq '.workflow_runs[0].run_number // 0'
          )"

          build_number="$latest_push"
          if (( latest_dispatch > build_number )); then
            build_number="$latest_dispatch"
          fi
          if (( build_number == 0 )); then
            echo "No successful code deployment was found." >&2
            exit 1
          fi

          echo "value=$build_number" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          VITE_BUILD_NUMBER: ${{ steps.build-number.outputs.value }}
          VITE_FIREBASE_API_KEY: AIzaSyBY8nKYYGMcxxmhLpFF1V-LMFQiBgrTYns
          VITE_FIREBASE_AUTH_DOMAIN: market-dashboard-f832e.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: market-dashboard-f832e
          VITE_FIREBASE_STORAGE_BUCKET: market-dashboard-f832e.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "923810954895"
          VITE_FIREBASE_APP_ID: 1:923810954895:web:7588911a204b75f407fafa
        run: npm run build

      - name: Verify dist output
        run: node scripts/verify-dist.mjs

      - name: List dist files
        run: find dist -type f | sort

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          commit_message: 'deploy: ${{ github.sha }}'
