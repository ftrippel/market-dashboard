name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # GITHUB_TOKEN pushes (e.g. fetch-data) do not trigger push workflows
  workflow_run:
    workflows: [Fetch Market Data]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  actions: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_FIREBASE_API_KEY: AIzaSyBY8nKYYGMcxxmhLpFF1V-LMFQiBgrTYns
          VITE_FIREBASE_AUTH_DOMAIN: market-dashboard-f832e.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: market-dashboard-f832e
          VITE_FIREBASE_STORAGE_BUCKET: market-dashboard-f832e.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "923810954895"
          VITE_FIREBASE_APP_ID: 1:923810954895:web:7588911a204b75f407fafa
        run: npm run build

      - name: Verify dist output
        run: node scripts/verify-dist.mjs

      - name: List dist files
        run: find dist -type f | sort

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          commit_message: 'deploy: ${{ github.sha }}'
